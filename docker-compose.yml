version: "3.9"

services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  growry:
    image: ghcr.io/${GH_USER}/growry:${TAG:-latest}
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    volumes:
      - ./db:/app/db

  linkhub:
    image: ghcr.io/${GH_USER}/linkhub:${TAG:-latest}
    restart: always
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      PORT: 3000

volumes:
  redis-data:
